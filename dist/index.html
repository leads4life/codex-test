<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>The Locked Study</title><style>body{margin:0;background:#070503;color:#f8e7bf;font-family:Georgia,serif}button,input,select{font:inherit}button{cursor:pointer}.hotspot{position:absolute;border:1px solid rgba(244,197,94,.35);background:rgba(244,197,94,.08);border-radius:14px;min-width:44px;min-height:44px}.hotspot:hover,.hotspot:focus{outline:3px solid #f4c55e;background:rgba(244,197,94,.2)}.panel{background:rgba(16,10,5,.94);border:1px solid rgba(244,197,94,.55);box-shadow:0 20px 80px #000;border-radius:16px}.bar{position:fixed;left:0;right:0;z-index:5;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;padding:.65rem;background:linear-gradient(180deg,rgba(0,0,0,.86),rgba(0,0,0,.45))}.top{top:0}.bottom{bottom:0}.modal{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:rgba(0,0,0,.86);padding:1rem}.card{max-width:720px;width:min(720px,96vw);max-height:88vh;overflow:auto;padding:1rem}.brass{color:#f4c55e}.item{width:76px}.item img{width:60px;height:60px}.selected{outline:3px solid #f4c55e}.room{height:100vh;overflow:hidden;position:relative}.room img{width:100%;height:100%;object-fit:cover}.note{font-size:.9rem;border-bottom:1px solid #5d421f;padding:.3rem}.side{position:fixed;right:.8rem;top:5rem;z-index:6;width:300px;max-height:62vh;overflow:auto;padding:.75rem}.choices button{margin:.25rem;padding:.55rem .8rem;background:#2a1d12;color:#f8e7bf;border:1px solid #9a7434;border-radius:8px}@media(max-width:760px){.side{display:none}.item{width:62px}.bottom{overflow-x:auto;flex-wrap:nowrap}}</style></head><body><div id="app"></div><script type="module" src="./app.js"></script></body></html>
